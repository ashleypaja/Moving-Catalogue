<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Moving Catalogue</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f8f5;
    --surface: #ffffff;
    --surface2: #f3f2ee;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #5a5954;
    --text3: #9a9890;
    --radius: 10px;
    --radius-sm: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a;
      --surface: #222224;
      --surface2: #2c2c2e;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --text: #f0efe8;
      --text2: #a0a09a;
      --text3: #666660;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .page {
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  header p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
  }

  .add-card {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .add-card h2 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  input, select {
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    font-family: inherit;
  }

  input:focus, select:focus {
    border-color: #888;
  }

  #nameInput { flex: 1; min-width: 160px; }
  #tagInput  { width: 180px; }
  #locInput  { width: 170px; }
  #noteInput { width: 160px; }

  button.add-btn {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: inherit;
    white-space: nowrap;
  }

  button.add-btn:hover { opacity: 0.85; }

  .tag-hint {
    font-size: 12px;
    color: var(--text3);
    line-height: 1.9;
  }

  .tag-hint code {
    font-family: 'SF Mono', 'Fira Code', monospace;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 11px;
    color: var(--text2);
  }

  .filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }

  .f-btn {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: all .12s;
  }

  .f-btn:hover { background: var(--surface2); }

  .f-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
    font-weight: 500;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px;
    margin-bottom: 1.75rem;
  }

  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: .85rem 1rem;
  }

  .stat-num { font-size: 24px; font-weight: 500; }
  .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .section { margin-bottom: 1.5rem; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 8px;
  }

  .section-header i { font-size: 16px; color: var(--text2); }
  .section-title { font-size: 13px; font-weight: 500; flex: 1; }

  .count-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text2);
    font-weight: 500;
  }

  .item-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    background: var(--surface);
    margin-bottom: 5px;
  }

  .item-body { flex: 1; }
  .item-name { font-size: 13px; color: var(--text); }

  .item-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
    align-items: center;
  }

  .chip {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
  }

  .item-loc {
    font-size: 11px;
    color: var(--text3);
    margin-left: 2px;
  }

  .item-note {
    font-size: 11px;
    color: var(--text2);
    margin-top: 3px;
  }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    padding: 3px 5px;
    font-size: 14px;
    line-height: 1;
    border-radius: 4px;
    display: flex;
    align-items: center;
  }

  .del-btn:hover { color: #dc2626; background: #fee2e2; }

  .empty {
    font-size: 13px;
    color: var(--text3);
    padding: 12px 0;
  }

  .export-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    justify-content: flex-end;
  }

  .ghost-btn {
    background: none;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text2);
    padding: 6px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: inherit;
  }

  .ghost-btn:hover { background: var(--surface2); }
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>📦 Moving Catalogue</h1>
    <p>Your two-stage moving plan — stage 1 back to family's, stage 2 abroad</p>
  </header>

  <div class="add-card">
    <h2>Add item</h2>
    <div class="input-row">
  <input type="text" id="nameInput" placeholder="Item name" />
  <select id="typeInput"><option value="">— type —</option></select>
  <select id="locInput">
    <option value="current">🏠 current rental</option>
    <option value="family">📦 family's place</option>
  </select>
  <select id="actionInput">
    <option value="Move">Move</option>
    <option value="Store">Store</option>
    <option value="Sell">Sell</option>
    <option value="Throw away">Throw away</option>
    <option value="Donate">Donate</option>
  </select>
  <select id="destInput">
    <option value="TW">TW (stay in Taiwan)</option>
    <option value="AU">AU (going to Australia)</option>
    <option value="Storage">Storage</option>
    <option value="Sell">Sell</option>
    <option value="Discard">Discard</option>
  </select>
  <input type="text" id="boxInput" placeholder="Box # (optional)" style="width:110px" />
  <input type="text" id="noteInput" placeholder="Note (optional)" />
  <button class="add-btn" onclick="addItem()"><i class="ti ti-plus"></i> Add</button>
</div>
    <div style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;">
  <button class="ghost-btn" onclick="showAddType()"><i class="ti ti-tag"></i> Add new type</button>
  <button class="ghost-btn" onclick="showAddDest()"><i class="ti ti-flag"></i> Add new destination</button>
</div>
<div id="addTypeForm" style="display:none; margin-top:10px; display:none; gap:8px; flex-wrap:wrap;">
  <input type="text" id="newTypeKey" placeholder="key (e.g. sport)" style="width:130px" />
  <input type="text" id="newTypeLabel" placeholder="Label (e.g. Sport)" style="width:130px" />
  <button class="ghost-btn" onclick="saveNewType()"><i class="ti ti-check"></i> Save type</button>
  <button class="ghost-btn" onclick="hideAddType()">Cancel</button>
</div>
<div id="addDestForm" style="display:none; margin-top:10px; gap:8px; flex-wrap:wrap;">
  <input type="text" id="newDestVal" placeholder="e.g. EU" style="width:130px" />
  <button class="ghost-btn" onclick="saveNewDest()"><i class="ti ti-check"></i> Save destination</button>
  <button class="ghost-btn" onclick="hideAddDest()">Cancel</button>
</div>
  </div>

<div class="filter-bar" id="filterBar">
  <button class="f-btn active" onclick="setFilter('all', this)">All</button>
  <button class="f-btn" onclick="setFilter('loc:current', this)">🏠 Rental</button>
  <button class="f-btn" onclick="setFilter('loc:family', this)">📦 Family's</button>
  <button class="f-btn" onclick="setFilter('action:Move', this)">Move</button>
  <button class="f-btn" onclick="setFilter('action:Store', this)">Store</button>
  <button class="f-btn" onclick="setFilter('action:Sell', this)">Sell</button>
  <button class="f-btn" onclick="setFilter('dest:AU', this)">→ AU</button>
  <button class="f-btn" onclick="setFilter('dest:TW', this)">→ TW</button>
  <button class="f-btn" onclick="setFilter('box', this)">📦 Boxed</button>
</div>

  <div class="stats-row" id="statsRow"></div>

  <div class="export-bar">
    <button class="ghost-btn" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button>
    <button class="ghost-btn" onclick="clearAll()"><i class="ti ti-trash"></i> Clear all</button>
  </div>

  <div id="catalogue"></div>

</div>

<script>
const COLORS = ['#92400e','#5b21b6','#78350f','#065f46','#075985','#1e40af','#9d174d','#6b7280','#be185d','#0f766e','#b45309','#4d7c0f'];
const BGS    = ['#fef3c7','#ede9fe','#fef9c3','#d1fae5','#e0f2fe','#dbeafe','#fce7f3','#f3f4f6','#fdf4ff','#ccfbf1','#fff7ed','#ecfccb'];

let tagMeta  = JSON.parse(localStorage.getItem('tagMeta') || JSON.stringify({
  furn:  { label:'Furniture',   color:'#92400e', bg:'#fef3c7' },
  anime: { label:'Anime',       color:'#5b21b6', bg:'#ede9fe' },
  book:  { label:'Books',       color:'#78350f', bg:'#fef9c3' },
  music: { label:'Music',       color:'#065f46', bg:'#d1fae5' },
  daily: { label:'Daily Use',   color:'#075985', bg:'#e0f2fe' },
  elec:  { label:'Electronics', color:'#1e40af', bg:'#dbeafe' },
  cloth: { label:'Clothing',    color:'#9d174d', bg:'#fce7f3' },
  misc:  { label:'Misc',        color:'#6b7280', bg:'#f3f4f6' },
}));

let sections = JSON.parse(localStorage.getItem('sections') || JSON.stringify([
  { key:'furn',  title:'Furniture',   icon:'ti-armchair',       tagKey:'furn'  },
  { key:'anime', title:'Anime',       icon:'ti-sparkles',       tagKey:'anime' },
  { key:'book',  title:'Books',       icon:'ti-book',           tagKey:'book'  },
  { key:'music', title:'Music',       icon:'ti-music',          tagKey:'music' },
  { key:'daily', title:'Daily Use',   icon:'ti-bolt',           tagKey:'daily' },
  { key:'elec',  title:'Electronics', icon:'ti-device-laptop',  tagKey:'elec'  },
  { key:'cloth', title:'Clothing',    icon:'ti-shirt',          tagKey:'cloth' },
  { key:'misc',  title:'Misc',        icon:'ti-dots',           tagKey:'misc'  },
]));

let destinations = JSON.parse(localStorage.getItem('destinations') || JSON.stringify(['TW','AU','Storage','Sell','Discard']));

let items  = JSON.parse(localStorage.getItem('movingCatalogue') || '[]');
let filter = 'all';

function save() {
  localStorage.setItem('movingCatalogue', JSON.stringify(items));
  localStorage.setItem('tagMeta', JSON.stringify(tagMeta));
  localStorage.setItem('sections', JSON.stringify(sections));
  localStorage.setItem('destinations', JSON.stringify(destinations));
}

function populateSelects() {
  const ts = document.getElementById('typeInput');
  ts.innerHTML = '<option value="">— type —</option>' +
    Object.entries(tagMeta).map(([k,v]) => `<option value="${k}">${v.label}</option>`).join('');
  const ds = document.getElementById('destInput');
  ds.innerHTML = destinations.map(d => `<option value="${d}">${d}</option>`).join('');
}

function addItem() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  items.push({
    id:     Date.now(),
    name,
    type:   document.getElementById('typeInput').value,
    loc:    document.getElementById('locInput').value,
    action: document.getElementById('actionInput').value,
    dest:   document.getElementById('destInput').value,
    box:    document.getElementById('boxInput').value.trim(),
    note:   document.getElementById('noteInput').value.trim(),
  });
  save();
  document.getElementById('nameInput').value = '';
  document.getElementById('boxInput').value  = '';
  document.getElementById('noteInput').value = '';
  render();
}

function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  save(); render();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getVisible() {
  if (filter === 'all') return items;
  if (filter.startsWith('loc:'))    return items.filter(i => i.loc    === filter.slice(4));
  if (filter.startsWith('action:')) return items.filter(i => i.action === filter.slice(7));
  if (filter.startsWith('dest:'))   return items.filter(i => i.dest   === filter.slice(5));
  if (filter === 'box')             return items.filter(i => i.box);
  return items;
}

function renderStats() {
  const s = document.getElementById('statsRow');
  s.innerHTML = [
    [items.length,                                        'total items'],
    [items.filter(i=>i.loc==='current').length,           'at rental'],
    [items.filter(i=>i.loc==='family').length,            'at family\'s'],
    [items.filter(i=>i.action==='Move').length,           'to move'],
    [items.filter(i=>i.dest==='AU').length,               '→ AU'],
    [items.filter(i=>i.box).length,                       'boxed'],
  ].map(([n,l]) => `<div class="stat-card"><div class="stat-num">${n}</div><div class="stat-label">${l}</div></div>`).join('');
}

function renderSection(sec, visible) {
  const sItems = visible.filter(i => i.type === sec.tagKey);
  if (!sItems.length) return '';
  const tm = tagMeta[sec.tagKey] || { color:'#6b7280', bg:'#f3f4f6' };
  const rows = sItems.map(item => {
    const actionColor = { Move:'#075985', Store:'#3f6212', Sell:'#92400e', 'Throw away':'#991b1b', Donate:'#5b21b6' }[item.action] || '#6b7280';
    const destColor   = item.dest === 'AU' ? '#065f46' : item.dest === 'TW' ? '#1e40af' : '#6b7280';
    return `<div class="item-row">
      <div class="item-body">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">
          <span class="chip" style="color:${actionColor};background:${actionColor}18">${item.action}</span>
          <span class="chip" style="color:${destColor};background:${destColor}18">→ ${item.dest}</span>
          <span class="item-loc">${item.loc === 'current' ? '🏠 rental' : '📦 family\'s'}</span>
          ${item.box ? `<span class="chip" style="color:#374151;background:#f3f4f6">📦 Box ${item.box}</span>` : ''}
        </div>
        ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
      </div>
      <button class="del-btn" onclick="deleteItem(${item.id})" title="Remove"><i class="ti ti-x"></i></button>
    </div>`;
  }).join('');
  return `<div class="section">
    <div class="section-header">
      <i class="ti ${sec.icon}" style="color:${tm.color}"></i>
      <span class="section-title">${sec.title}</span>
      <span class="count-badge">${sItems.length}</span>
    </div>${rows}
  </div>`;
}

function renderUncategorised(visible) {
  const sItems = visible.filter(i => !i.type || !sections.find(s=>s.tagKey===i.type));
  if (!sItems.length) return '';
  const rows = sItems.map(item => `<div class="item-row">
    <div class="item-body">
      <div class="item-name">${item.name}</div>
      <div class="item-meta"><span class="item-loc">${item.loc==='current'?'🏠 rental':'📦 family\'s'}</span></div>
      ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
    </div>
    <button class="del-btn" onclick="deleteItem(${item.id})"><i class="ti ti-x"></i></button>
  </div>`).join('');
  return `<div class="section">
    <div class="section-header"><i class="ti ti-question-mark"></i><span class="section-title">Uncategorised</span><span class="count-badge">${sItems.length}</span></div>
    ${rows}
  </div>`;
}

function render() {
  populateSelects();
  renderStats();
  const visible = getVisible();
  const cat = document.getElementById('catalogue');
  if (!visible.length) { cat.innerHTML = '<div class="empty">No items yet.</div>'; return; }
  cat.innerHTML = sections.map(s => renderSection(s, visible)).join('') + renderUncategorised(visible);
}

// Add type
function showAddType() {
  const f = document.getElementById('addTypeForm');
  f.style.display = f.style.display === 'flex' ? 'none' : 'flex';
}
function hideAddType() { document.getElementById('addTypeForm').style.display = 'none'; }
function saveNewType() {
  const key   = document.getElementById('newTypeKey').value.trim().toLowerCase().replace(/\s+/,'_');
  const label = document.getElementById('newTypeLabel').value.trim();
  if (!key || !label) return;
  const idx = Object.keys(tagMeta).length % COLORS.length;
  tagMeta[key] = { label, color: COLORS[idx], bg: BGS[idx] };
  sections.push({ key, title: label, icon: 'ti-tag', tagKey: key });
  save(); hideAddType();
  document.getElementById('newTypeKey').value   = '';
  document.getElementById('newTypeLabel').value = '';
  render();
}

// Add destination
function showAddDest() {
  const f = document.getElementById('addDestForm');
  f.style.display = f.style.display === 'flex' ? 'none' : 'flex';
}
function hideAddDest() { document.getElementById('addDestForm').style.display = 'none'; }
function saveNewDest() {
  const val = document.getElementById('newDestVal').value.trim();
  if (!val || destinations.includes(val)) return;
  destinations.push(val);
  save(); hideAddDest();
  document.getElementById('newDestVal').value = '';
  render();
}

function exportCSV() {
  const header = 'Name,Type,Location,Action,Destination,Box,Note';
  const rows = items.map(i =>
    `"${i.name}","${i.type}","${i.loc}","${i.action}","${i.dest}","${i.box}","${i.note}"`
  );
  const blob = new Blob([header+'\n'+rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'moving-catalogue.csv'; a.click();
}

function clearAll() {
  if (confirm('Clear all items? This cannot be undone.')) { items=[]; save(); render(); }
}

document.getElementById('nameInput').addEventListener('keydown', e => { if(e.key==='Enter') addItem(); });
render();
</script>
</body>
</html>
